<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>

    <style>
 body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #eef2f5;
    font-family: Arial, sans-serif;
}

h3 {
    color: #5b7c99;
}

form {
    width: 300px;
    padding: 20px;
    border: 2px solid #b8d4e3;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

input,
textarea {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
    border: 1px solid #d1d5db;
    border-radius: 4px;
}

button {
    padding: 10px;
    background-color: #b8d4e3;
    border: 1px solid #9ecae1;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #9ecae1;
}

a {
    margin-top: 15px;
    color: #5b7c99;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}
    </style>
</head>
<body>

    <h3>formulario</h3>

    <form>
        Nome completo:<br>
        <input type="text" name="nome">

        whatsapp (numero de telefone):<br>
        <input type="email" name="email">

        Mensagem especifica:<br>
        <textarea rows="4"></textarea>

        <button type="submit">Enviar</button>
    </form>

    <br>

    <a href="index.html">Voltar</a>

</body>
</html>
