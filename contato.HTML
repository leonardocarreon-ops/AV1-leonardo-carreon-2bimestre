<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Me Adicione</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #5865F2, #23272A);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      text-decoration: none;
      color: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      font-size: 18px;
      transition: 0.3s;
    }

    .game {
      background: #00b894;
    }

    .game:hover {
      background: #00d1a0;
      transform: scale(1.05);
    }

    .discord {
      background: #5865F2;
    }

    .discord:hover {
      background: #6d78ff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🎮 Me Adicione</h1>
    <p>Entre em contato comigo no jogo ou no Discord!</p>

    <!-- BOTÃO DO JOGO -->
    <a class="btn game" href="SEU_LINK_DO_JOGO" target="_blank">
      🎯 Me adicionar no jogo
    </a>

    <!-- BOTÃO DO DISCORD -->
    <a class="btn discord" href="https://discord.gg/SEU_LINK" target="_blank">
      💬 Meu Discord
    </a>
  </div>

</body>
</html>
