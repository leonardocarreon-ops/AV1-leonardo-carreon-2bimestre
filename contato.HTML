<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="stylesheet" href="style.css" />

    <style>
  body {
    background: #D3D6DA;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
}

h3 {
    color: #55789c;
    margin-top: 80px;
    margin-bottom: 20px;
}

form {
    width: 300px;
    margin: 0 auto;
    padding: 20px;

    border: 1px solid #9fc3d6;
    border-radius: 8px;

    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
}

input,
textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 15px;

    border: 1px solid #c0c0c0;
    border-radius: 3px;

    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;

    border: 1px solid #8db3c7;
    border-radius: 3px;

    background: #a9c6d8;
    cursor: pointer;
}

button:hover {
    background: #98bbd1;
}

a {
    display: inline-block;
    margin-top: 30px;

    text-decoration: none;
    color: #55789c;
}

a:hover {
    text-decoration: underline;
}
